trigger:
- master

# Variables
variables:
  tag: '$(Build.BuildId)'

stages:
# Build Stage 
- stage: Build
  displayName: Build Stage
  jobs:
  - job: Build
    displayName: Build Job
    pool:
      name: default

    steps: 

    # Task-1: Build Docker Image and push to ACR
    - task: Docker@2
      inputs:
        containerRegistry: 'manual-aksdevop-svc'
        repository: 'custom2aksnginxapp1'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)
          $(Build.SourceVersion)

    # Debug - list files
    - bash: echo "Contents in System Default Working Directory"; ls -R $(System.DefaultWorkingDirectory)
    - bash: echo "Before copying Contents in Build Artifact Directory"; ls -R $(Build.ArtifactStagingDirectory)

    # Task-2: Copy kube-manifests
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/manifests'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        OverWrite: true

    # Debug after copy
    - bash: echo "After copying to Build Artifact Directory"; ls -R $(Build.ArtifactStagingDirectory)

    # Task-3: Publish Artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'kube-manifests'
        publishLocation: 'Container'

    # ✅ Final Success Message
    - script: echo "Jai Gireesh - Pipeline completed successfully 🎉"
      displayName: 'Success Message'
      condition: succeeded()