trigger:
- master

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build Stage

  jobs:
  - job: Build
    displayName: Build Job
    pool:
      name: default

    steps:

    # ✅ Build & Push Docker Image
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'manual-aksdevop-svc'
        repository: 'custom2aksnginxapp1'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)
          $(Build.SourceVersion)

    # 🔍 Debug - List repo files
    - bash: |
        echo "===== SOURCE DIRECTORY ====="
        ls -R $(System.DefaultWorkingDirectory)

    # 🔍 Before copy
    - bash: |
        echo "===== BEFORE COPY ====="
        ls -R $(Build.ArtifactStagingDirectory)

    # ✅ FIXED: Correct source path
    - task: CopyFiles@2
      displayName: Copy Kubernetes Manifests
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/Git-Repository-files/kube-manifests'
        Contents: '**/*.yml'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        OverWrite: true

    # 🔍 After copy
    - bash: |
        echo "===== AFTER COPY ====="
        ls -R $(Build.ArtifactStagingDirectory)

    # ✅ Publish artifacts (clean structure)
    - task: PublishBuildArtifacts@1
      displayName: Publish Kubernetes Manifests
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'kube-manifests'
        publishLocation: 'Container'

    # 🔥 Banner
    - bash: |
        echo ""
        echo "🚩🚩🚩 BUILD SUCCESS 🚩🚩🚩"
        echo "🚀 JAI GIREEESH 🚀"
        echo ""
      displayName: 'Success Banner'
      condition: succeeded()