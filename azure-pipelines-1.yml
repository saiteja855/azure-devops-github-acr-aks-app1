trigger:
- main

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: 'efab7040-2411-4d95-b28b-c397fb8c0fca'
  imageRepository: 'saitejaazuredevopsgithubacraksapp'
  containerRegistry: 'aksdevop.azurecr.io'
  tag: '$(Build.BuildId)'
  imagePullSecret: 'aksdevop2118f8c8-auth'

stages:

# ================= BUILD STAGE =================
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      name: default

    steps:
    - checkout: self

    # 🔐 Login to ACR
    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    # 🔥 Build ARM64 image from correct folder
    - script: |
        cd Git-Repository-files

        docker build --platform linux/arm64 \
          -t $(containerRegistry)/$(imageRepository):$(tag) .

        docker push $(containerRegistry)/$(imageRepository):$(tag)
      displayName: Build and push ARM64 image

    # 📦 Upload manifests from correct path
    - task: CopyFiles@2
      inputs:
        SourceFolder: 'Git-Repository-files/kube-manifests'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: manifests


# ================= DEPLOY STAGE =================
- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build

  jobs:
  - deployment: Deploy
    displayName: Deploy
    pool:
      name: default
    environment: 'saiteja855azuredevopsgithubacraksapp1.default'

    strategy:
      runOnce:
        deploy:
          steps:

          # 🔐 Create image pull secret
          - task: KubernetesManifest@0
            displayName: Create imagePullSecret
            inputs:
              action: createSecret
              secretName: $(imagePullSecret)
              dockerRegistryEndpoint: $(dockerRegistryServiceConnection)

          # 🚀 Deploy to AKS
          - task: KubernetesManifest@0
            displayName: Deploy to Kubernetes cluster
            inputs:
              action: deploy
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yml
                $(Pipeline.Workspace)/manifests/service.yml
              imagePullSecrets: |
                $(imagePullSecret)
              containers: |
                $(containerRegistry)/$(imageRepository):$(tag)